// ═══════════════════════════════════════════════════════════════════

function shade(hex, f) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
  return `rgb(${Math.min(255,r*f)|0},${Math.min(255,g*f)|0},${Math.min(255,b*f)|0})`
}
function lerp(a, b, t) { return a + (b - a) * t }

// Use a seeded pseudo-random for deterministic furniture placement
let _seed = 42
function srnd() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed - 1) / 2147483646 }

function drawFloor(z) {
  const { x, y, w, h, floor } = z
  ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip()

  if (floor === 'darkwood') {
    ctx.fillStyle = '#130C05'; ctx.fillRect(x, y, w, h)
    // planks
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1
    for (let py = y; py < y + h; py += 14) {
      ctx.beginPath(); ctx.moveTo(x, py); ctx.lineTo(x + w, py); ctx.stroke()
    }
    ctx.fillStyle = 'rgba(255,220,120,0.018)'
    for (let py = y + 7; py < y + h; py += 28) { ctx.fillRect(x, py, w, 7) }

  } else if (floor === 'marble') {
    ctx.fillStyle = '#07071A'; ctx.fillRect(x, y, w, h)
    ctx.strokeStyle = 'rgba(180,180,255,0.08)'; ctx.lineWidth = 0.8
    for (let i = 0; i < 4; i++) {
      ctx.beginPath()
      ctx.moveTo(x + w * (0.1 + i * 0.25), y)
      ctx.bezierCurveTo(x + w * (0.3 + i * 0.2), y + h * 0.4, x + w * (0.55 + i * 0.1), y + h * 0.7, x + w * (0.8 + i * 0.05), y + h)
      ctx.stroke()
    }

  } else if (floor === 'officegray') {
    ctx.fillStyle = '#15171E'; ctx.fillRect(x, y, w, h)
    ctx.strokeStyle = 'rgba(255,255,255,0.022)'; ctx.lineWidth = 1
    for (let px = x; px < x + w; px += 32) { ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px, y + h); ctx.stroke() }
    for (let py = y; py < y + h; py += 32) { ctx.beginPath(); ctx.moveTo(x, py); ctx.lineTo(x + w, py); ctx.stroke() }

  } else if (floor === 'worldmap') {
    ctx.fillStyle = '#0C1E2C'; ctx.fillRect(x, y, w, h)
    ctx.fillStyle = '#172B17'
    const masses = [[x+28,y+55,82,55],[x+138,y+38,105,78],[x+78,y+136,118,48],[x+238,y+75,78,66],[x+48,y+155,68,38]]
    masses.forEach(([lx,ly,lw,lh]) => { ctx.beginPath(); ctx.ellipse(lx+lw/2,ly+lh/2,lw/2,lh/2,0,0,Math.PI*2); ctx.fill() })
    ctx.strokeStyle = 'rgba(255,255,255,0.035)'; ctx.lineWidth = 0.5
    for (let px = x+40; px < x+w; px += 60) { ctx.beginPath(); ctx.moveTo(px,y); ctx.lineTo(px,y+h); ctx.stroke() }
    for (let py = y+28; py < y+h; py += 48) { ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke() }
    // destination pins
    [[x+92,y+98],[x+198,y+68],[x+278,y+138],[x+128,y+168]].forEach(([px,py]) => {
      ctx.fillStyle = '#C9A264'; ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill()
      ctx.strokeStyle = '#C9A264'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py-11); ctx.stroke()
    })

  } else if (floor === 'warmwood') {
    ctx.fillStyle = '#140A05'; ctx.fillRect(x, y, w, h)
    ctx.strokeStyle = 'rgba(255,160,80,0.04)'; ctx.lineWidth = 1.5
    for (let r = 18; r < Math.max(w,h)*1.6; r += 18) {
      ctx.beginPath(); ctx.arc(x + w * 0.38, y + h * 0.52, r, 0, Math.PI*2); ctx.stroke()
    }

  } else if (floor === 'carpet') {
    ctx.fillStyle = '#0A1208'; ctx.fillRect(x, y, w, h)
    ctx.fillStyle = 'rgba(0,0,0,0.2)'
    for (let py = y; py < y + h; py += 6) { ctx.fillRect(x, py, w, 3) }

  } else if (floor === 'softtile') {
    ctx.fillStyle = '#111812'; ctx.fillRect(x, y, w, h)
    const ts = 20
    for (let tx = x; tx < x + w; tx += ts) {
      for (let ty = y; ty < y + h; ty += ts) {
        if ((((tx-x)/ts)|0 + ((ty-y)/ts)|0) % 2 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.018)'; ctx.fillRect(tx,ty,ts,ts)
        }
      }
    }
  }
  ctx.restore()
}

function drawBarCounter(x, y, w, h) {

function drawBottleShelf(x, y, w, h) {
  ctx.fillStyle = '#090503'; ctx.fillRect(x, y, w, h)
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(x, y, w, 1.5)
  const cols = ['#8B0000','#2F4F4F','#1C1C8B','#4B0082','#556B2F','#8B4513','#2E8B57','#800080','#B8860B','#003366','#6B3FA0','#A0522D']
  _seed = 7
  let bx = x + 10
  while (bx < x+w-18) {
    const col = cols[Math.floor(srnd()*cols.length)]
    const bh = 14 + srnd()*9 | 0
    ctx.fillStyle = col; ctx.fillRect(bx, y+h-bh, 6, bh)

    ctx.fillStyle = shade(col, 0.5); ctx.fillRect(bx+5, y+h-bh, 1, bh)

function drawBooth(cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = '#1D0D07'; ctx.fill()
  ctx.beginPath(); ctx.arc(cx, cy, r-7, 0, Math.PI*2); ctx.fillStyle = '#271108'; ctx.fill()
  ctx.beginPath(); ctx.arc(cx, cy, r-20, 0, Math.PI*2); ctx.fillStyle = '#190904'; ctx.fill()
  ctx.beginPath(); ctx.arc(cx, cy, r-21, 0, Math.PI*2); ctx.strokeStyle = '#3A1E0A'; ctx.lineWidth = 1.5; ctx.stroke()
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r-20)
  g.addColorStop(0, 'rgba(201,162,100,0.13)'); g.addColorStop(1, 'transparent')
  ctx.beginPath(); ctx.arc(cx, cy, r-20, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill()
}

function drawDesk(x, y, w, h, accentColor) {
  ctx.fillStyle = '#1C1C2C'; ctx.fillRect(x, y, w, h)
  ctx.fillStyle = 'rgba(0,0,0,0.38)'; ctx.fillRect(x+w-2, y, 2, h); ctx.fillRect(x, y+h-2, w, 2)
  const mw = w*0.38, mh = h*0.52
  const mx = x+w*0.55, my = y+h*0.1
  ctx.fillStyle = '#101020'; ctx.fillRect(mx, my, mw, mh)
  const mg = ctx.createRadialGradient(mx+mw/2, my+mh/2, 1, mx+mw/2, my+mh/2, mw*0.9)
  mg.addColorStop(0, accentColor.replace('rgb','rgba').replace(')',',0.2)') || 'rgba(91,155,213,0.2)')
  mg.addColorStop(1, 'transparent')
  ctx.fillStyle = mg; ctx.fillRect(mx, my, mw, mh)
  ctx.fillStyle = '#181828'; ctx.fillRect(x+w*0.12, y+h*0.65, w*0.42, h*0.2)
}

function drawHighTop(cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = '#201006'; ctx.fill()
  ctx.beginPath(); ctx.arc(cx, cy, r-3, 0, Math.PI*2); ctx.fillStyle = '#2A1810'; ctx.fill()

function drawMoodBoard(x, y, w, h) {
  ctx.fillStyle = '#100D1A'; ctx.fillRect(x, y, w, h)
  ctx.strokeStyle = 'rgba(167,139,250,0.15)'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h)
  const pc = ['#C9A264','#5B9BD5','#64B5A0','#E8956D','#A78BFA','#81C784','#FF6B6B','#FFD700']
  _seed = 13
  for (let i = 0; i < 11; i++) {
    const px = x+7+srnd()*(w-22), py = y+5+srnd()*(h-18)
    const pw = 12+srnd()*16|0, ph = 9+srnd()*14|0
    const col = pc[i % pc.length]
    ctx.save(); ctx.translate(px+pw/2, py+ph/2); ctx.rotate((srnd()-0.5)*0.35)
    ctx.fillStyle = col+'28'; ctx.fillRect(-pw/2, -ph/2, pw, ph)
    ctx.strokeStyle = col+'58'; ctx.lineWidth = 0.8; ctx.strokeRect(-pw/2, -ph/2, pw, ph)
    ctx.restore()
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.beginPath(); ctx.arc(px+pw/2, py+1, 1.5, 0, Math.PI*2); ctx.fill()
  }
}

function drawWhiteboard(x, y, w, h) {

}

function drawGlobe(cx, cy, r) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = '#0C1928'; ctx.fill()
  ctx.fillStyle = '#192E19'
  ;[[cx-r*0.38,cy-r*0.28,r*0.48,r*0.38],[cx+r*0.12,cy-r*0.18,r*0.38,r*0.48],[cx-r*0.18,cy+r*0.22,r*0.32,r*0.28]].forEach(([lx,ly,lw,lh]) => {
    ctx.beginPath(); ctx.ellipse(lx+lw/2, ly+lh/2, lw/2, lh/2, 0, 0, Math.PI*2); ctx.fill()
  })
  ctx.strokeStyle = 'rgba(255,255,255,0.055)'; ctx.lineWidth = 0.5
  for (let i = 1; i < 3; i++) { ctx.beginPath(); ctx.moveTo(cx-r, cy-r+i*r*0.65); ctx.lineTo(cx+r, cy-r+i*r*0.65); ctx.stroke() }
  ctx.strokeStyle = 'rgba(129,199,132,0.35)'; ctx.lineWidth = 1.5
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke()
  ctx.fillStyle = '#1A1A1A'; ctx.fillRect(cx-3, cy+r, 6, 7); ctx.fillRect(cx-10, cy+r+5, 20, 3)
}

function drawCouch(x, y, w, h, col) {

function drawBookshelf(x, y, w, h) {
  ctx.fillStyle = '#0C1008'; ctx.fillRect(x, y, w, h)
  ctx.strokeStyle = 'rgba(70,50,30,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h)
  const bc = ['#5C3317','#8B6914','#1C3D1C','#2D1B69','#3D0000','#2E4A2E','#4A3000','#1A1A4A','#3D2D00']
  _seed = 23; const rows = Math.floor(h/28)
  for (let row = 0; row < rows; row++) {
    let bx = x + 2; const by = y + 6 + row*28
    while (bx < x+w-5) {
      const bw = 6+srnd()*5|0, bh = 16+srnd()*8|0
      ctx.fillStyle = bc[Math.floor(srnd()*bc.length)]; ctx.fillRect(bx, by+23-bh, bw, bh)
      ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(bx, by+23-bh, 1, bh)
      bx += bw + 1
    }
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(x, by+24, w, 2)
  }
}

function drawRoundTable(cx, cy, r, col) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = col; ctx.fill()
  ctx.beginPath(); ctx.arc(cx, cy, r-3, 0, Math.PI*2); ctx.strokeStyle = shade(col, 1.35); ctx.lineWidth = 1.5; ctx.stroke()
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/2
    const crx = cx + Math.cos(a)*(r+14), cry = cy + Math.sin(a)*(r+14)
    ctx.beginPath(); ctx.arc(crx, cry, 8, 0, Math.PI*2)
    ctx.fillStyle = 'rgba(255,255,255,0.038)'; ctx.fill()
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke()
  }
}

function drawCommandPlatform(x, y, w, h) {
  ctx.fillStyle = '#050510'; ctx.fillRect(x, y, w, h)
  ctx.strokeStyle = 'rgba(180,180,255,0.14)'; ctx.lineWidth = 1.5
  ctx.strokeRect(x+1, y+1, w-2, h-2)
  const pg = ctx.createRadialGradient(x+w/2, y+h/2, 8, x+w/2, y+h/2, w*0.55)
  pg.addColorStop(0, 'rgba(180,180,255,0.07)'); pg.addColorStop(1, 'transparent')
  ctx.fillStyle = pg; ctx.fillRect(x, y, w, h)
  const mstarts = [x+w/2-168, x+w/2-52, x+w/2+62]
  mstarts.forEach((mx, i) => {
    const mw = i===1 ? 112 : 90, mh = i===1 ? 52 : 42, my = y+(h-mh)/2
    ctx.fillStyle = '#08081C'; ctx.fillRect(mx, my, mw, mh)
    const mg = ctx.createRadialGradient(mx+mw/2, my+mh/2, 4, mx+mw/2, my+mh/2, mw*0.75)
    mg.addColorStop(0, 'rgba(180,180,255,0.22)'); mg.addColorStop(1, 'transparent')
    ctx.fillStyle = mg; ctx.fillRect(mx, my, mw, mh)
    ctx.strokeStyle = 'rgba(180,180,255,0.22)'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh)
    ctx.strokeStyle = 'rgba(180,180,255,0.28)'; ctx.lineWidth = 0.8; ctx.beginPath()
    for (let wx = mx+7; wx < mx+mw-7; wx += 4) {
      const wy = my+mh/2 + Math.sin(wx*0.22)*6
      wx === mx+7 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy)
    }
    ctx.stroke()
  })
}

// 10. CHARACTER SPRITES

function drawStar(cx, cy, ro, ri, pts) {
  ctx.beginPath()
  for (let i = 0; i < pts*2; i++) {
    const ang = (i*Math.PI/pts) - Math.PI/2, r = i%2===0 ? ro : ri
    i === 0 ? ctx.moveTo(cx+r*Math.cos(ang), cy+r*Math.sin(ang))
             : ctx.lineTo(cx+r*Math.cos(ang), cy+r*Math.sin(ang))
  }
  ctx.closePath(); ctx.fill()
}

// ─── HAIR STYLES ─────────────────────────────────────────────────────────────

function drawHairStyle(id, x, hy, color) {
  ctx.fillStyle = color
  const LONG  = ['rachel','vivian','copy','wg_brand','librarian','social_mgr','social513']
  const SWEPT = ['cd','marketing','wg_em','wg_prop','tp_pm','acquisition']
  const SHORT = ['danny','ops','drink','postmortem','wg_audit','wg_std','bookkeeper','wg_comp']
  if (LONG.includes(id)) {
    ctx.beginPath(); ctx.arc(x, hy, 10, Math.PI, 0); ctx.fill()
    ctx.fillRect(x-11, hy-4, 4, 16); ctx.fillRect(x+7, hy-4, 4, 14)
  } else if (SWEPT.includes(id)) {
    ctx.beginPath()
    ctx.moveTo(x-10, hy); ctx.arc(x, hy, 10, Math.PI, -0.25)
    ctx.lineTo(x+12, hy-9); ctx.lineTo(x-3, hy-10)
    ctx.fill()
  } else if (SHORT.includes(id)) {
    ctx.beginPath(); ctx.arc(x, hy, 9, Math.PI+0.3, -0.3); ctx.fill()
  } else {
    ctx.beginPath(); ctx.arc(x, hy, 10, Math.PI, 0); ctx.fill()
    ctx.fillRect(x-10, hy-2, 3, 5); ctx.fillRect(x+7, hy-2, 3, 5)

}

function drawBoardHair(id, x, hy) {

function drawBoardAccessory(id, x, hy, bodyY, frame, mc) {

    ctx.strokeStyle = 'rgba(212,175,55,0.4)'; ctx.lineWidth = 1; ctx.stroke()

}

function drawScanBeam(agent) {
  if (!agent.scanning) return
  const { x, y, scanFrame, walking, homeX, homeY } = agent
  const atDesk = !walking && Math.abs(x - homeX) < 4 && Math.abs(y - homeY) < 4
  const bodyY = atDesk ? y-32 : y-28
  const headY = bodyY - 16
  const sf = scanFrame, prog = sf / SCAN_DUR
  const maxR = 36
  const r2 = prog < 0.45 ? maxR*prog/0.45 : maxR*(1-prog)/0.55
  ctx.save()
  ctx.globalAlpha = (1-prog)*0.85
  ctx.strokeStyle = 'rgba(180,180,255,0.95)'; ctx.lineWidth = 1.5
  ctx.beginPath(); ctx.arc(x, headY, r2, 0, Math.PI*2); ctx.stroke()
  if (sf > SCAN_DUR*0.38 && agent.meridianScore) {
    ctx.globalAlpha = Math.min(1, (sf - SCAN_DUR*0.38)/(SCAN_DUR*0.18))
    ctx.font = '700 8px Montserrat'; ctx.textAlign = 'center'
    ctx.fillStyle = 'rgba(180,180,255,0.95)'
    ctx.fillText(`Q:${agent.meridianScore.quality}/5`, x, headY-28)
  }
  ctx.restore()
}

// ─── DRAW DISPATCHER ─────────────────────────────────────────────────────────

function drawAgent(agent) {
  if (agent.id === 'meridian') drawMeridian(agent)
  else if (['marcus','rachel','danny','vivian'].includes(agent.id)) drawBoardMember(agent)
  else drawAgentStandard(agent)
  drawScanBeam(agent)
}

// ─── OPTION B: STANDARD AGENTS ───────────────────────────────────────────────

function drawAgentStandard(agent) {
  const { x, y, state, model, frame, selected, name, id, walking, homeX, homeY } = agent
  const mc = MC[model] || MC.sonnet
  const hair = HAIR[id] || '#1A1A1A'
  const atDesk = !walking && Math.abs(x - homeX) < 4 && Math.abs(y - homeY) < 4
  const isWorking = state === 'working' || state === 'patrolling'
  const isSleeping = state === 'sleeping'

  ctx.save()
  if (isSleeping) ctx.globalAlpha = 0.36

  // Working spotlight on floor
  if (isWorking) {
    ctx.save()
    const pulse = 0.5 + Math.sin(frame * 0.05) * 0.5
    const sg = ctx.createRadialGradient(x, y, 0, x, y, 28)
    sg.addColorStop(0, mc.bg); sg.addColorStop(1, 'rgba(0,0,0,0)')
    ctx.globalAlpha = 0.5 + pulse * 0.35
    ctx.fillStyle = sg; ctx.beginPath(); ctx.ellipse(x, y, 28, 14, 0, 0, Math.PI*2); ctx.fill()
    ctx.restore()
  }

  // Shadow
  ctx.beginPath(); ctx.ellipse(x, y+2, 13, 5, 0, 0, Math.PI*2)
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.fill()

  // Legs
  if (!atDesk) {
    const swing = walking ? Math.sin(frame * 0.14) * 5 : 0
    ctx.fillStyle = shade(mc.body, 0.65)
    ctx.fillRect(x-6, y-12+swing, 5, 14); ctx.fillRect(x+1, y-12-swing, 5, 14)
    ctx.fillStyle = shade(mc.body, 0.5)
    ctx.fillRect(x-6, y+1+swing, 5, 3); ctx.fillRect(x+1, y+1-swing, 5, 3)
  }

  // Body
  const bodyY = atDesk ? y-32 : y-28
  const headTilt = (isWorking && atDesk) ? 2 : 0
  ctx.fillStyle = mc.body; ctx.fillRect(x-9, bodyY, 18, 20)
  ctx.fillStyle = 'rgba(255,255,255,0.14)'; ctx.fillRect(x-3, bodyY, 6, 5)
  ctx.fillStyle = 'rgba(0,0,0,0.20)'; ctx.fillRect(x-1, bodyY, 2, 6)
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(x+7, bodyY+2, 2, 18); ctx.fillRect(x-9, bodyY+18, 18, 2)

  // Arms
  if (!atDesk) {
    const as = walking ? -Math.sin(frame*0.14)*3 : 0
    ctx.fillStyle = shade(mc.body, 0.82)
    ctx.fillRect(x-14, bodyY+2+as, 5, 14); ctx.fillRect(x+9, bodyY+2-as, 5, 14)
  } else {
    ctx.fillStyle = shade(mc.body, 0.82)
    ctx.fillRect(x-13, bodyY+12, 5, 10); ctx.fillRect(x+8, bodyY+12, 5, 10)
    if (isWorking) {
      ctx.save()
      const lp = 0.4 + Math.sin(frame*0.04)*0.3
      ctx.globalAlpha = lp; ctx.shadowBlur = 8; ctx.shadowColor = mc.color
      ctx.fillStyle = mc.color; ctx.fillRect(x-7, bodyY+21, 14, 2)
      ctx.shadowBlur = 0; ctx.restore()
    }
  }

  // Neck
  ctx.fillStyle = '#C8956C'; ctx.fillRect(x-3+headTilt, bodyY-5, 6, 6)

  // Head
  const headY = bodyY - 16
  const hx = x + headTilt
  const hg = ctx.createRadialGradient(hx-2, headY-3, 2, hx, headY, 10)
  hg.addColorStop(0, '#EAB89A'); hg.addColorStop(1, '#C07050')
  ctx.beginPath(); ctx.arc(hx, headY, 10, 0, Math.PI*2); ctx.fillStyle = hg; ctx.fill()

  // Hair
  drawHairStyle(id, hx, headY, hair)

  // Eyes
  if (!isSleeping) {
    const blink = ((frame*0.013 + id.length*0.4) % 1) > 0.96
    const eyeH = blink ? 1 : 2
    ctx.fillStyle = '#0F0F18'
    ctx.fillRect(hx-5, headY-2, 3, eyeH); ctx.fillRect(hx+2, headY-2, 3, eyeH)
    ctx.fillStyle = 'rgba(255,255,255,0.55)'
    ctx.fillRect(hx-4, headY-3, 1, 1); ctx.fillRect(hx+3, headY-3, 1, 1)
  }

  // State icon
  const iconY = headY - 22
  if (!isSleeping) {
    ctx.save()
    if (isWorking) {
      const pulse = 0.5 + Math.sin(frame*0.05)*0.5
      ctx.globalAlpha = 0.55 + pulse*0.45
      ctx.shadowBlur = 10; ctx.shadowColor = mc.color; ctx.fillStyle = mc.color
      ctx.beginPath()
      ctx.moveTo(hx, iconY-7); ctx.lineTo(hx+5, iconY)
      ctx.lineTo(hx, iconY+7); ctx.lineTo(hx-5, iconY)
      ctx.closePath(); ctx.fill()
      ctx.shadowBlur = 0
    } else if (state === 'idle') {
      ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(255,255,255,0.5)'
      ctx.fillRect(hx-4, iconY-1, 8, 2)
    } else if (state === 'break') {
      ctx.globalAlpha = 0.9; ctx.fillStyle = '#C8A060'
      ctx.fillRect(hx-5, iconY-4, 10, 8); ctx.fillRect(hx+5, iconY-2, 4, 4)
      ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(hx-4, iconY-3, 8, 3)
    }
    ctx.restore()
  }

  // Sleeping zzz
  if (isSleeping) {
    ctx.save()
    ;['z','zz','zzz'].forEach((z2, i) => {
      const t = ((frame*0.018 + i*1.5) % 1)
      const alpha = t < 0.5 ? t*2 : (1-t)*2
      ctx.globalAlpha = 0.35 * alpha
      ctx.font = 'italic 700 9px Montserrat'; ctx.fillStyle = '#9898CC'; ctx.textAlign = 'center'
      ctx.fillText(z2, x+10+i*4, headY-18-t*26)
    })
    ctx.restore()
  }

  // Name tag + current task
  if (!isSleeping) {
    ctx.save()
    ctx.font = '600 7.5px Montserrat'; ctx.textAlign = 'center'
    ctx.fillStyle = (selected || isWorking) ? mc.color : 'rgba(255,255,255,0.72)'
    ctx.fillText(name.split(' ')[0], x, y+17)
    if (isWorking && agent.currentTask) {
      ctx.globalAlpha = 0.65; ctx.font = '500 6.5px Montserrat'; ctx.fillStyle = mc.color
      const tStr = agent.currentTask.length > 20 ? agent.currentTask.slice(0,19)+'…' : agent.currentTask
      ctx.fillText(tStr, x, y+26)
    }
    ctx.restore()
  }

  // Selection ring
  if (selected) {
    ctx.save()
    ctx.beginPath(); ctx.ellipse(x, y+2, 19, 8, 0, 0, Math.PI*2)
    ctx.strokeStyle = mc.color; ctx.lineWidth = 1.5
    ctx.setLineDash([4,4]); ctx.lineDashOffset = -frame*0.08
    ctx.stroke(); ctx.setLineDash([])
    ctx.restore()
  }

  ctx.restore()
  ctx.textAlign = 'left'
}

// ─── OPTION C: MERIDIAN ──────────────────────────────────────────────────────

function drawMeridian(agent) {
  const { x, y, state, frame, selected, walking, homeX, homeY } = agent
  const mc = MC.meridian
  const atDesk = !walking && Math.abs(x - homeX) < 4 && Math.abs(y - homeY) < 4
  const isWorking = state === 'working' || state === 'patrolling'

  ctx.save()

  // Breathing aura — always active
  const breathe = 0.5 + Math.sin(frame * 0.03) * 0.5
  ctx.save()
  const auraG = ctx.createRadialGradient(x, y-18, 5, x, y-8, 42)
  auraG.addColorStop(0, `rgba(180,180,255,${(0.10 + breathe*0.09).toFixed(3)})`)
  auraG.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.globalAlpha = 1; ctx.fillStyle = auraG
  ctx.beginPath(); ctx.ellipse(x, y-8, 42, 50, 0, 0, Math.PI*2); ctx.fill()
  ctx.restore()

  // Shadow with soft glow
  ctx.save()
  ctx.shadowBlur = 14; ctx.shadowColor = 'rgba(180,180,255,0.45)'
  ctx.beginPath(); ctx.ellipse(x, y+2, 15, 6, 0, 0, Math.PI*2)
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill()
  ctx.shadowBlur = 0; ctx.restore()

  // Legs
  if (!atDesk) {
    const swing = walking ? Math.sin(frame * 0.14) * 5 : 0
    ctx.fillStyle = shade(mc.body, 0.7)
    ctx.fillRect(x-7, y-12+swing, 5, 14); ctx.fillRect(x+2, y-12-swing, 5, 14)
    ctx.fillStyle = shade(mc.body, 0.55)
    ctx.fillRect(x-7, y+1+swing, 5, 3); ctx.fillRect(x+2, y+1-swing, 5, 3)
  }

  const bodyY = atDesk ? y-34 : y-30

  // Coat tails
  ctx.fillStyle = shade(mc.body, 0.75)
  ctx.beginPath()
  ctx.moveTo(x-11, bodyY+18); ctx.lineTo(x-5, bodyY+18)
  ctx.lineTo(x-4, bodyY+32); ctx.lineTo(x-13, bodyY+30); ctx.closePath(); ctx.fill()
  ctx.beginPath()
  ctx.moveTo(x+5, bodyY+18); ctx.lineTo(x+11, bodyY+18)
  ctx.lineTo(x+13, bodyY+30); ctx.lineTo(x+4, bodyY+32); ctx.closePath(); ctx.fill()

  // Body — 22px wide silver coat
  ctx.fillStyle = mc.body; ctx.fillRect(x-11, bodyY, 22, 22)
  ctx.fillStyle = 'rgba(220,220,255,0.18)'; ctx.fillRect(x-4, bodyY, 8, 10)
  ctx.fillStyle = mc.trim; ctx.fillRect(x-11, bodyY, 2, 22); ctx.fillRect(x+9, bodyY, 2, 22)
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(x+9, bodyY+2, 2, 20); ctx.fillRect(x-11, bodyY+20, 22, 2)
  ctx.fillStyle = '#D4AF37'
  ;[5, 10, 15].forEach(oy => { ctx.beginPath(); ctx.arc(x, bodyY+oy, 1.5, 0, Math.PI*2); ctx.fill() })

  // Arms
  if (!atDesk) {
    const as = walking ? -Math.sin(frame*0.14)*3 : 0
    ctx.fillStyle = shade(mc.body, 0.85)
    ctx.fillRect(x-16, bodyY+2+as, 5, 15); ctx.fillRect(x+11, bodyY+2-as, 5, 15)
    ctx.fillStyle = mc.trim
    ctx.fillRect(x-16, bodyY+15+as, 5, 2); ctx.fillRect(x+11, bodyY+15-as, 5, 2)
  }

  // Neck
  ctx.fillStyle = '#C8956C'; ctx.fillRect(x-3, bodyY-5, 6, 6)

  // Head
  const headY = bodyY - 16
  const hg = ctx.createRadialGradient(x-2, headY-3, 2, x, headY, 11)
  hg.addColorStop(0, '#EAB89A'); hg.addColorStop(1, '#C07050')
  ctx.beginPath(); ctx.arc(x, headY, 11, 0, Math.PI*2); ctx.fillStyle = hg; ctx.fill()

  // Silver hair — wide wings
  ctx.fillStyle = HAIR.meridian
  ctx.beginPath(); ctx.arc(x, headY, 11, Math.PI, 0); ctx.fill()
  ctx.fillRect(x-14, headY-3, 4, 11); ctx.fillRect(x+10, headY-3, 4, 11)

  // Glowing eyes
  ctx.save()
  ctx.shadowBlur = 7; ctx.shadowColor = mc.color; ctx.fillStyle = mc.color
  ctx.fillRect(x-5, headY-2, 3, 2); ctx.fillRect(x+2, headY-2, 3, 2)
  ctx.shadowBlur = 0; ctx.restore()

  // Pulsing body rings
  const pulse = 0.5 + Math.sin(frame*0.04)*0.5
  ctx.save()
  ctx.globalAlpha = 0.16 + pulse*0.18; ctx.strokeStyle = mc.color; ctx.lineWidth = 1
  ctx.beginPath(); ctx.ellipse(x, bodyY+11, 19, 27, 0, 0, Math.PI*2); ctx.stroke()
  ctx.globalAlpha = 0.07 + pulse*0.08
  ctx.beginPath(); ctx.ellipse(x, bodyY+11, 24, 32, 0, 0, Math.PI*2); ctx.stroke()
  ctx.restore()

  // State icon
  const iconY = headY - 26
  ctx.save()
  if (isWorking) {
    const p2 = 0.5 + Math.sin(frame*0.05)*0.5
    ctx.globalAlpha = 0.75 + p2*0.25
    ctx.shadowBlur = 14; ctx.shadowColor = mc.color; ctx.fillStyle = mc.color
    drawStar(x, iconY, 7, 3, 5); ctx.shadowBlur = 0
  } else if (state === 'idle') {
    ctx.globalAlpha = 0.5; ctx.fillStyle = mc.color; ctx.fillRect(x-5, iconY-1, 10, 2)
  }
  ctx.restore()

  // Name tag
  ctx.save()
  ctx.shadowBlur = 8; ctx.shadowColor = mc.color
  ctx.font = '700 8.5px Montserrat'; ctx.textAlign = 'center'; ctx.fillStyle = mc.color
  ctx.fillText('Meridian', x, y+19); ctx.shadowBlur = 0
  ctx.globalAlpha = 0.65; ctx.font = '500 6.5px Montserrat'
  ctx.fillStyle = 'rgba(180,180,255,0.85)'; ctx.fillText('The Chief', x, y+28)
  ctx.restore()

  // Selection ring
  if (selected) {
    ctx.save()
    ctx.beginPath(); ctx.ellipse(x, y+2, 22, 9, 0, 0, Math.PI*2)
    ctx.strokeStyle = mc.color; ctx.lineWidth = 2
    ctx.setLineDash([4,4]); ctx.lineDashOffset = -frame*0.08
    ctx.stroke(); ctx.setLineDash([])
    ctx.restore()
  }

  ctx.restore()
  ctx.textAlign = 'left'
}

// ─── OPTION C: BOARD MEMBERS ─────────────────────────────────────────────────

function drawBoardMember(agent) {

    ctx.fillStyle = shade(mc.body, 0.6)
    ctx.fillRect(x-7, y-12+swing, 5, 14); ctx.fillRect(x+2, y-12-swing, 5, 14)
    ctx.fillStyle = shade(mc.body, 0.45)
    ctx.fillRect(x-7, y+1+swing, 5, 3); ctx.fillRect(x+2, y+1-swing, 5, 3)
  }

  const bodyY = atDesk ? y-33 : y-29

  // Body — 22px wide suit
  ctx.fillStyle = mc.body; ctx.fillRect(x-11, bodyY, 22, 22)
  // Lapels
  ctx.fillStyle = shade(mc.body, 0.75)
  ctx.beginPath(); ctx.moveTo(x-11, bodyY); ctx.lineTo(x-2, bodyY+8); ctx.lineTo(x-2, bodyY); ctx.closePath(); ctx.fill()
  ctx.beginPath(); ctx.moveTo(x+11, bodyY); ctx.lineTo(x+2, bodyY+8); ctx.lineTo(x+2, bodyY); ctx.closePath(); ctx.fill()
  // Shirt + tie
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x-2, bodyY, 4, 18)
  ctx.fillStyle = '#D4AF37'
  ctx.beginPath()
  ctx.moveTo(x-1, bodyY+2); ctx.lineTo(x+1, bodyY+2); ctx.lineTo(x+2, bodyY+15)
  ctx.lineTo(x, bodyY+19); ctx.lineTo(x-2, bodyY+15); ctx.closePath(); ctx.fill()
  // Pocket square
  ctx.fillStyle = 'rgba(212,175,55,0.7)'; ctx.fillRect(x-10, bodyY+3, 4, 3)
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(x+9, bodyY+2, 2, 20); ctx.fillRect(x-11, bodyY+20, 22, 2)

  // Arms
  if (!atDesk) {
    const as = walking ? -Math.sin(frame*0.14)*3 : 0
    ctx.fillStyle = shade(mc.body, 0.82)
    ctx.fillRect(x-16, bodyY+2+as, 5, 14); ctx.fillRect(x+11, bodyY+2-as, 5, 14)
    ctx.fillStyle = 'rgba(255,255,255,0.22)'
    ctx.fillRect(x-16, bodyY+14+as, 5, 2); ctx.fillRect(x+11, bodyY+14-as, 5, 2)
  }

  // Neck
  ctx.fillStyle = '#C8956C'; ctx.fillRect(x-3, bodyY-5, 6, 6)

  // Head
  const headY = bodyY - 16
  const hg = ctx.createRadialGradient(x-2, headY-3, 2, x, headY, 11)
  hg.addColorStop(0, '#EAB89A'); hg.addColorStop(1, '#C07050')
  ctx.beginPath(); ctx.arc(x, headY, 11, 0, Math.PI*2); ctx.fillStyle = hg; ctx.fill()

  drawBoardHair(id, x, headY)

  // Eyes
  if (!isSleeping) {
    const blink = ((frame*0.013 + id.length*0.4) % 1) > 0.96
    const eyeH = blink ? 1 : 2
    ctx.fillStyle = '#0F0F18'
    ctx.fillRect(x-5, headY-2, 3, eyeH); ctx.fillRect(x+2, headY-2, 3, eyeH)
    ctx.fillStyle = 'rgba(255,255,255,0.55)'
    ctx.fillRect(x-4, headY-3, 1, 1); ctx.fillRect(x+3, headY-3, 1, 1)
  }

  drawBoardAccessory(id, x, headY, bodyY, frame, mc)

  // State icon
  const iconY = headY - 25
  if (!isSleeping) {
    ctx.save()
    if (isWorking) {
      const pulse = 0.5 + Math.sin(frame*0.05)*0.5
      ctx.globalAlpha = 0.65 + pulse*0.35
      ctx.shadowBlur = 12; ctx.shadowColor = mc.color; ctx.fillStyle = mc.color
      drawStar(x, iconY, 6, 3, 5); ctx.shadowBlur = 0
    } else if (state === 'idle') {
      ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(255,255,255,0.5)'
      ctx.fillRect(x-4, iconY-1, 8, 2)
    }
    ctx.restore()
  }

  // Sleeping zzz
  if (isSleeping) {
    ctx.save()
    ;['z','zz','zzz'].forEach((z2, i) => {
      const t = ((frame*0.018 + i*1.5) % 1)
      const alpha = t < 0.5 ? t*2 : (1-t)*2
      ctx.globalAlpha = 0.35 * alpha
      ctx.font = 'italic 700 9px Montserrat'; ctx.fillStyle = '#9898CC'; ctx.textAlign = 'center'
      ctx.fillText(z2, x+10+i*4, headY-18-t*26)
    })
    ctx.restore()
  }

  // Name tag + role subtitle
  if (!isSleeping) {
    ctx.save()
    ctx.font = '600 8px Montserrat'; ctx.textAlign = 'center'
    ctx.fillStyle = (selected || isWorking) ? mc.color : 'rgba(255,255,255,0.82)'
    ctx.fillText(name.split(' ')[0], x, y+19)
    ctx.globalAlpha = 0.65; ctx.font = '500 6.5px Montserrat'
    ctx.fillStyle = 'rgba(201,162,100,0.85)'
    ctx.fillText(ROLES[id] || '', x, y+28)
    ctx.restore()
  }

  // Selection ring
  if (selected) {
    ctx.save()
    ctx.beginPath(); ctx.ellipse(x, y+2, 21, 9, 0, 0, Math.PI*2)
    ctx.strokeStyle = mc.color; ctx.lineWidth = 1.5
    ctx.setLineDash([4,4]); ctx.lineDashOffset = -frame*0.08
    ctx.stroke(); ctx.setLineDash([])
    ctx.restore()
  }

  ctx.restore()
  ctx.textAlign = 'left'
}

// ═══════════════════════════════════════════════════════════════════
// 11. COMM ANIMATIONS
// ═══════════════════════════════════════════════════════════════════
let COMMS = []

function fireComm(fromId, toId, icon = 'envelope') {
  const fa = GA(fromId), ta = GA(toId)
  if (!fa || !ta) return
  COMMS.push({ fromId, toId, icon, x: fa.x, y: fa.y-44, progress: 0, done: false })
}

function tickAndDrawComms() {
  COMMS = COMMS.filter(c => !c.done)
  COMMS.forEach(c => {
    const fa = GA(c.fromId), ta = GA(c.toId)
    if (!fa || !ta) { c.done = true; return }
    const d = Math.hypot(ta.x - fa.x, ta.y - fa.y)
    c.progress = Math.min(1, c.progress + COMM_SPEED / Math.max(1, d))
    c.x = lerp(fa.x, ta.x, c.progress)
    c.y = lerp(fa.y-44, ta.y-44, c.progress)
    if (c.progress >= 1) { c.done = true; return }

    const alpha = c.progress < 0.1 ? c.progress*10 : c.progress > 0.85 ? (1-c.progress)/0.15 : 1
    ctx.save(); ctx.globalAlpha = alpha
    if (c.icon === 'envelope') {
      ctx.fillStyle = '#E8E8D0'; ctx.fillRect(c.x-7, c.y-5, 14, 10)
      ctx.strokeStyle = '#AAA880'; ctx.lineWidth = 0.8
      ctx.beginPath(); ctx.moveTo(c.x-7, c.y-5); ctx.lineTo(c.x, c.y+1); ctx.lineTo(c.x+7, c.y-5); ctx.stroke()
      ctx.globalAlpha = alpha*0.18; ctx.fillStyle = '#E8E8D0'; ctx.fillRect(c.x-4, c.y-3, 8, 6)
    } else {
      ctx.translate(c.x, c.y); ctx.rotate(-0.28)
      ctx.fillStyle = '#F0F0EA'; ctx.fillRect(-6,-8,12,16)
      ctx.fillStyle = 'rgba(0,0,0,0.12)'
      for (let l = 0; l < 3; l++) ctx.fillRect(-4, -4+l*5, 8, 1.5)
    }
    ctx.restore()
  })
}

// ═══════════════════════════════════════════════════════════════════
// 12. EVENT SYSTEM
// ═══════════════════════════════════════════════════════════════════
const EVENTS = []

function queueEvent(evt, delay = 0) { EVENTS.push({ ...evt, _cd: delay }) }

function tickEvents() {
  for (let i = EVENTS.length-1; i >= 0; i--) {
    if (EVENTS[i]._cd-- > 0) continue
    fireEvent(EVENTS[i]); EVENTS.splice(i, 1)
  }
}

function walkTo(id, path, onDone) {
  const a = GA(id); if (!a) return
  a.walkPath = [...path]; a._onArrived = onDone; a.walking = true
}

function wakeAgent(id) {
  const a = GA(id); if (!a) return
  if (a.state === 'sleeping' || a.state === 'idle') { a.state = 'working'; a.idleTimer = 0 }
}

function fireEvent(e) {
  switch (e.type) {

    case 'COMM_DELAYED':
      fireComm(e.fromId, e.toId, e.icon || 'envelope')
      break

    case 'DESIGN_HANDOFF':
      ;['cd','ad','copy','qa'].forEach(id => wakeAgent(id))
      fireComm('cd','ad','envelope')
      fireComm('cd','copy','paper')
      queueEvent({ type:'COMM_DELAYED', fromId:'ad',   toId:'qa', icon:'envelope' }, 95)
      queueEvent({ type:'COMM_DELAYED', fromId:'copy', toId:'qa', icon:'paper'    }, 118)
      walkTo('cd', [{ x:GA('ad').homeX-18, y:GA('ad').homeY }, { x:GA('copy').homeX, y:GA('copy').homeY+18 }, { x:GA('cd').homeX, y:GA('cd').homeY }],
        () => { GA('cd').state = 'working' })
      break

    case 'WEBGROWTH_PIPELINE':
      ;['wg_em','wg_brand','wg_audit','wg_comp','wg_call','wg_price','wg_prop','wg_proto','wg_design'].forEach(id => wakeAgent(id))
      ;[['wg_em','wg_brand'],['wg_em','wg_audit'],['wg_brand','wg_call'],['wg_audit','wg_comp'],
        ['wg_comp','wg_call'],['wg_call','wg_price'],['wg_call','wg_prop'],['wg_price','wg_prop'],
        ['wg_prop','wg_proto'],['wg_design','wg_proto']
      ].forEach(([f,t], i) => queueEvent({ type:'COMM_DELAYED', fromId:f, toId:t, icon: i%2===0?'envelope':'paper' }, i*48))
      queueEvent({ type:'EM_PATROL' }, 40)
      break

    case 'EM_PATROL':
      walkTo('wg_em', [{ x:GA('wg_prop').homeX+38, y:GA('wg_prop').homeY-18 }, { x:GA('wg_em').homeX, y:GA('wg_em').homeY }],
        () => { GA('wg_em').state = 'working' })
      break

    case 'BOARD_CONVENE': {
      const wc = ZONES.warroom.x + ZONES.warroom.w/2
      const wy = ZONES.warroom.y + ZONES.warroom.h/2
      const seats = [{ x:wc, y:wy-58 }, { x:wc+58, y:wy }, { x:wc, y:wy+58 }, { x:wc-58, y:wy }]
      ;['marcus','rachel','danny','vivian'].forEach((id, i) => {
        queueEvent({ type:'BOARD_WALK', agentId:id, seat:seats[i] }, i*14)
      })
      queueEvent({ type:'BOARD_RETURN' }, e.holdFrames || 230)
      break
    }

    case 'BOARD_WALK':
      walkTo(e.agentId, [e.seat], () => { GA(e.agentId).state = 'working' })
      break

    case 'BOARD_RETURN':
      ;['marcus','rachel','danny','vivian'].forEach(id => {
        const a = GA(id); if (!a) return
        walkTo(id, [{ x:a.homeX, y:a.homeY }], () => { a.state = 'working' })
      })
      break

    case 'MERIDIAN_EVALUATE': {
      const target = GA(e.targetId), mer = GA('meridian')
      if (!target || !mer) break
      wakeAgent(e.targetId)
      walkTo('meridian', [{ x:target.x, y:target.y-28 }], () => {
        target.scanning = true; target.scanFrame = 0
        if (!target.meridianScore) {
          const right = 3 + Math.floor(Math.random()*3), quality = 3 + Math.floor(Math.random()*3)
          target.meridianScore = { right, quality, refinement: quality < 4 ? 'Consider more structured output format.' : null }
        }
        queueEvent({ type:'MERIDIAN_RETURN' }, SCAN_DUR + 25)
      })
      break
    }

    case 'MERIDIAN_RETURN': {
      const mer = GA('meridian')
      if (!mer) break
      walkTo('meridian', [{ x:mer.homeX, y:mer.homeY }], () => { mer.state = 'working' })
      break
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// 13. AGENT UPDATE (MOVEMENT + STATE)
// ═══════════════════════════════════════════════════════════════════
function updateAgent(a, dt) {
  a.frame += dt * 0.056

  // Scan tick
  if (a.scanning) {
    a.scanFrame++
    if (a.scanFrame >= SCAN_DUR) { a.scanning = false; a.scanFrame = 0 }
  }

  // Walk along path
  if (a.walkPath && a.walkPath.length > 0) {
    const t = a.walkPath[0]
    const dx = t.x - a.x, dy = t.y - a.y
    const d = Math.hypot(dx, dy)
    if (d < 2.5) {
      a.x = t.x; a.y = t.y; a.walkPath.shift()
      if (a.walkPath.length === 0) {
        a.walking = false
        if (a._onArrived) { a._onArrived(); a._onArrived = null }
      }
    } else {
      const spd = WALK_SPEED * (a.id === 'meridian' ? 1.3 : 1)
      a.x += (dx/d)*spd; a.y += (dy/d)*spd
      a.walking = true; a.state = 'patrolling'
    }
  } else {
    a.walking = false
  }

  // Idle / sleep decay
  if (a.id === 'meridian') return
  if ((a.state === 'working' || a.state === 'idle') && !a.walking) {
    a.idleTimer++
    if (a.idleTimer > SLEEP_THRESH) a.state = 'sleeping'
    else if (a.idleTimer > IDLE_THRESH && a.state === 'working') a.state = 'idle'
  }
}

// ═══════════════════════════════════════════════════════════════════
// 14. DEMO SCHEDULER
// ═══════════════════════════════════════════════════════════════════
let demoCycle = 0, demoTimer = 0
const DEMO_INTERVAL = 540

function tickDemo() {
  if (++demoTimer < DEMO_INTERVAL) return
  demoTimer = 0; demoCycle++
  const pick = demoCycle % 4
  if (pick === 0) queueEvent({ type:'DESIGN_HANDOFF' })
  else if (pick === 1) queueEvent({ type:'WEBGROWTH_PIPELINE' })
  else if (pick === 2) queueEvent({ type:'BOARD_CONVENE', holdFrames:210 })
  else {
    const pool = AGENTS.filter(a => a.id !== 'meridian')
    const target = pool[Math.floor(Math.random()*pool.length)]
    wakeAgent(target.id)
    queueEvent({ type:'MERIDIAN_EVALUATE', targetId:target.id })
  }
}

// ═══════════════════════════════════════════════════════════════════
// 15. RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, CW, CH)
  ctx.fillStyle = '#05060D'; ctx.fillRect(0, 0, CW, CH)

  ZONE_ORDER.forEach(zid => drawFloor(ZONES[zid]))
  ZONE_ORDER.forEach(zid => drawZoneBorder(ZONES[zid]))
  ZONE_ORDER.forEach(zid => drawZoneFurniture(zid, ZONES[zid]))

  // Agents sorted by y (painter's algorithm)
  ;[...AGENTS].sort((a,b) => a.y - b.y).forEach(a => drawAgent(a))

  // Bar counter drawn OVER agents (Drink goes behind bar)
  drawForeground()

  // Comm animations
  tickAndDrawComms()

  // Zone labels on top
  ZONE_ORDER.forEach(zid => drawZoneLabel(ZONES[zid]))

  // Ambient tints last
  ZONE_ORDER.forEach(zid => {
    const z = ZONES[zid]
    if (z.ambient) { ctx.fillStyle = z.ambient; ctx.fillRect(z.x, z.y, z.w, z.h) }
  })
}

// ═══════════════════════════════════════════════════════════════════
// 16. GAME LOOP
// ═══════════════════════════════════════════════════════════════════
let lastTime = 0
function loop(ts) {
  const dt = Math.min(ts - lastTime, 32); lastTime = ts
  tickEvents()
  AGENTS.forEach(a => updateAgent(a, dt))
  tickDemo()
  render()
  requestAnimationFrame(loop)
}

// ═══════════════════════════════════════════════════════════════════
// 17. PAN & ZOOM
// ═══════════════════════════════════════════════════════════════════
const viewport = document.getElementById('viewport')
let panX = 0, panY = 0, zoom = 1
let dragging = false, dragStart = { x:0, y:0 }, panStart = { x:0, y:0 }
let _dragged = false

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`
  canvas.style.transformOrigin = '0 0'
}
function initCamera() {
  panX = Math.min(0, (viewport.clientWidth  - CW) / 2)
  panY = Math.min(0, (viewport.clientHeight - CH) / 2)
  applyTransform()
}

viewport.addEventListener('mousedown', e => {
  if (e.target !== canvas) return
  dragging = true; _dragged = false
  dragStart = { x:e.clientX, y:e.clientY }
  panStart  = { x:panX, y:panY }
  viewport.classList.add('dragging')
})
window.addEventListener('mousemove', e => {
  if (!dragging) return
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y
  if (Math.abs(dx)+Math.abs(dy) > 4) _dragged = true
  panX = panStart.x + dx; panY = panStart.y + dy; applyTransform()
})
window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('dragging') })

viewport.addEventListener('wheel', e => {
  e.preventDefault()
  const rect = viewport.getBoundingClientRect()
  const mx = e.clientX - rect.left, my = e.clientY - rect.top
  const dz = e.deltaY > 0 ? -0.08 : 0.08
  const oldZ = zoom
  zoom = Math.max(0.42, Math.min(2.4, zoom + dz))
  panX = mx - (mx - panX)*(zoom/oldZ)
  panY = my - (my - panY)*(zoom/oldZ)
  applyTransform()
}, { passive: false })

// ═══════════════════════════════════════════════════════════════════
// 18. CLICK & HOVER
// ═══════════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip')
let hoveredAgent = null

function canvasXY(e) {
  const rect = canvas.getBoundingClientRect()
  return {
    x: (e.clientX - rect.left) * (canvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (canvas.height / rect.height),
  }
}
function hitTest(mx, my) {
  return AGENTS.find(a => Math.hypot(mx-a.x, my-(a.y-24)) < 24)
}

canvas.addEventListener('click', e => {
  if (_dragged) return
  const { x, y } = canvasXY(e)
  const hit = hitTest(x, y)
  AGENTS.forEach(a => a.selected = false)
  if (hit) { hit.selected = true; showInfoPanel(hit) }
  else hideInfoPanel()
})

canvas.addEventListener('mousemove', e => {
  if (dragging) { tooltip.style.display = 'none'; return }
  const { x, y } = canvasXY(e)
  const found = hitTest(x, y)
  if (found !== hoveredAgent) {
    hoveredAgent = found
    if (found) {
      canvas.style.cursor = 'pointer'
      tooltip.textContent = found.task || `${found.role} · ${found.state}`
      tooltip.style.display = 'block'
    } else {
      canvas.style.cursor = ''
      tooltip.style.display = 'none'
    }
  }
  if (found) {
    tooltip.style.left = (e.clientX + 14) + 'px'
    tooltip.style.top  = (e.clientY - 28) + 'px'
  }
})
canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; hoveredAgent = null })

// ═══════════════════════════════════════════════════════════════════
// 19. INFO PANEL
// ═══════════════════════════════════════════════════════════════════
const STATE_COLORS  = { working:'#81C784', idle:'rgba(255,255,255,0.28)', sleeping:'#444', patrolling:'#5B9BD5', communicating:'#A78BFA', break:'#E8956D' }
const STATE_LABELS  = { working:'Working', idle:'Idle — waiting to be invoked', sleeping:'Sleeping', patrolling:'On the move', communicating:'Passing work', break:'On break' }
const ZONE_LABELS   = { command:'Command Center', sips:'513 Sips HQ', wg:'WebGrowth Agency', library:'Library', travel:'Travel Suite', warroom:'War Room', breakroom:'Break Room' }

function showInfoPanel(agent) {
  const mc = MC[agent.model] || MC.sonnet
  const badge = document.getElementById('info-model-badge')
  badge.textContent = mc.label
  badge.style.background = mc.bg; badge.style.color = mc.color
  badge.style.border = `1px solid ${mc.color}30`

  document.getElementById('info-name').textContent = agent.name
  document.getElementById('info-role').textContent = agent.role
  document.getElementById('info-zone-group').textContent = ZONE_LABELS[agent.zone] || agent.zone
  document.getElementById('info-bio').textContent = agent.bio

  document.getElementById('info-state-dot').style.background = STATE_COLORS[agent.state] || '#888'
  document.getElementById('info-state-text').textContent = STATE_LABELS[agent.state] || agent.state
  document.getElementById('info-task').textContent = agent.task || 'Ready to invoke'
  document.getElementById('info-last-active').textContent = agent.lastEngagement ? `Last active: ${agent.lastEngagement}` : 'Not yet invoked this session'

  const ms = document.getElementById('info-meridian-section')
  if (agent.id === 'meridian') {
    ms.style.display = 'none'
  } else {
    ms.style.display = 'block'
    if (agent.meridianScore) {
      const s = agent.meridianScore
      const avg = Math.round((s.right + s.quality) / 2)
      document.getElementById('info-stars').textContent = '★'.repeat(avg) + '☆'.repeat(5-avg)
      document.getElementById('info-stars').style.color = avg >= 4 ? '#C9A264' : avg >= 3 ? '#E8956D' : '#FF7070'
      document.getElementById('info-score-detail').textContent = `Right agent: ${s.right}/5  ·  Quality: ${s.quality}/5`
      document.getElementById('info-refinement-note').textContent = s.refinement ? `↳ ${s.refinement}` : ''
    } else {
      document.getElementById('info-stars').textContent = 'Not yet evaluated'
      document.getElementById('info-stars').style.color = 'rgba(255,255,255,0.28)'
      document.getElementById('info-score-detail').textContent = ''
      document.getElementById('info-refinement-note').textContent = ''
    }
  }

  document.getElementById('info-invoke').textContent = agent.id === 'meridian'
    ? 'Meridian evaluates automatically at session end.'
    : `Say: "Act as the ${agent.name} agent"`

  document.getElementById('info-panel').classList.add('open')
}

function hideInfoPanel() {
  document.getElementById('info-panel').classList.remove('open')
}

document.getElementById('info-close').addEventListener('click', () => {
  AGENTS.forEach(a => a.selected = false)
  hideInfoPanel()
})

// ═══════════════════════════════════════════════════════════════════
// 20. INIT
// ═══════════════════════════════════════════════════════════════════
initCamera()
requestAnimationFrame(loop)

// Staggered opening demo events
setTimeout(() => queueEvent({ type:'DESIGN_HANDOFF' }), 2200)
setTimeout(() => queueEvent({ type:'WEBGROWTH_PIPELINE' }), 6000)
setTimeout(() => queueEvent({ type:'BOARD_CONVENE', holdFrames:200 }), 11500)
setTimeout(() => {
  const t = AGENTS.filter(a => a.id !== 'meridian')[4]
  wakeAgent(t.id); queueEvent({ type:'MERIDIAN_EVALUATE', targetId:t.id })
}, 17000)
</script>
